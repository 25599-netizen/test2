<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ฟอร์มบันทึกข้อมูลนักเรียน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'ChulaCharasNew', 'Helvetica Neue', sans-serif; }
        .form-container { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <h2 class="text-center mb-4 text-primary">ระบบบันทึกข้อมูลนักเรียน</h2>
        
        <form id="studentForm">
            <div class="mb-3">
                <label for="prefix" class="form-label">คำนำหน้าชื่อ</label>
                <select class="form-select" id="prefix" required>
                    <option value="" disabled selected>เลือกคำนำหน้าชื่อ</option>
                    <option value="เด็กชาย">เด็กชาย</option>
                    <option value="เด็กหญิง">เด็กหญิง</option>
                    <option value="นาย">นาย</option>
                    <option value="นางสาว">นางสาว</option>
                </select>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="firstName" class="form-label">ชื่อ</label>
                    <input type="text" class="form-control" id="firstName" placeholder="ภาษาไทย" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="lastName" class="form-label">นามสกุล</label>
                    <input type="text" class="form-control" id="lastName" placeholder="ภาษาไทย" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="grade" class="form-label">ชั้นมัธยมศึกษาปีที่</label>
                    <select class="form-select" id="grade" required>
                        <option value="" disabled selected>เลือกชั้นปี</option>
                        <option value="1">ม.1</option>
                        <option value="2">ม.2</option>
                        <option value="3">ม.3</option>
                        <option value="4">ม.4</option>
                        <option value="5">ม.5</option>
                        <option value="6">ม.6</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="room" class="form-label">ห้อง</label>
                    <input type="number" class="form-control" id="room" min="1" placeholder="ตัวเลข เช่น 1" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="studentNo" class="form-label">เลขที่</label>
                    <input type="number" class="form-control" id="studentNo" min="1" placeholder="เช่น 15" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="studentId" class="form-label">เลขประจำตัว (5 หลัก)</label>
                    <input type="text" class="form-control" id="studentId" pattern="\d{5}" maxlength="5" placeholder="ตัวเลข 5 หลัก" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="height" class="form-label">ส่วนสูง (ซม.)</label>
                    <input type="number" step="0.1" class="form-control" id="height" placeholder="เช่น 165.5" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="weight" class="form-label">น้ำหนัก (กก.)</label>
                    <input type="number" step="0.1" class="form-control" id="weight" placeholder="เช่น 52.3" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-3">บันทึกข้อมูล</button>
        </form>
    </div>
</div>

<script>
    // กำหนด URL ของ Google Apps Script ที่ได้มา
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwHV_PPEoSmazXpVo1uKzZtRfr3CRQD20qbtwNT3o0Jx9gJZIAcdmTr9eGcI41mFcpIOg/exec";

    document.getElementById('studentForm').addEventListener('submit', function(e) {
        e.preventDefault(); // ป้องกันการรีโหลดหน้าจอเมื่อกดส่งฟอร์ม

        // 1. แสดง SweetAlert กำลังโหลด (Loading) ห้ามผู้ใช้กดปิดเอง
        Swal.fire({
            title: 'กำลังบันทึกข้อมูล...',
            text: 'กรุณารอสักครู่ระบบกำลังส่งข้อมูลไปยังฐานข้อมูล',
            allowOutsideClick: false,
            didOpen: () => {
                Swal.showLoading();
            }
        });

        // 2. ดึงข้อมูลจากฟอร์ม
        const data = {
            prefix: document.getElementById('prefix').value,
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            grade: document.getElementById('grade').value,
            room: document.getElementById('room').value,
            studentNo: document.getElementById('studentNo').value,
            studentId: document.getElementById('studentId').value,
            height: document.getElementById('height').value,
            weight: document.getElementById('weight').value
        };

        // 3. เริ่มกระบวนการส่งข้อมูลแบบ JSONP
        // กำหนดชื่อ Callback function สำหรับรับค่ากลับมา (แบบสุ่มเพื่อไม่ให้ซ้ำกันกรณีส่งติดๆ กัน)
        const callbackName = 'jsonpCallback_' + Math.round(100000 * Math.random());
        
        // สร้างฟังก์ชันชั่วคราวบน window เพื่อให้ Google Apps Script เรียกกลับมาทำงาน
        window[callbackName] = function(response) {
            if (response.result === 'success') {
                // แจ้งเตือนเมื่อบันทึกสำเร็จ
                Swal.fire({
                    icon: 'success',
                    title: 'บันทึกสำเร็จ!',
                    text: 'ข้อมูลของท่านถูกบันทึกลงในระบบเรียบร้อยแล้ว',
                    confirmButtonText: 'ตกลง'
                });
                document.getElementById('studentForm').reset(); // เคลียร์ข้อมูลเก่าในฟอร์มออก
            } else {
                // แจ้งเตือนเมื่อเกิดข้อผิดพลาดจากฝั่ง Server
                Swal.fire({
                    icon: 'error',
                    title: 'เกิดข้อผิดพลาด',
                    text: 'ไม่สามารถบันทึกข้อมูลได้: ' + response.message
                });
            }
            
            // ลบแท็ก <script> และฟังก์ชัน callback ทิ้งหลังจากทำงานเสร็จเพื่อเคลียร์หน่วยความจำ
            document.body.removeChild(script);
            delete window[callbackName];
        };

        // แปลงออบเจกต์ข้อมูลให้อยู่ในรูป Query String สำหรับส่งผ่าน URL
        const queryString = Object.keys(data)
            .map(key => encodeURIComponent(key) + '=' + encodeURIComponent(data[key]))
            .join('&');

        // 4. สร้างแท็ก <script> เพื่อยิงคำขอไปยัง Apps Script (หัวใจหลักของ JSONP เพื่อเลี่ยง CORS)
        const script = document.createElement('script');
        script.src = `${WEB_APP_URL}?callback=${callbackName}&${queryString}`;
        
        // หากส่งข้อมูลล้มเหลว (เช่น Network พัง หรือ URL ผิด)
        script.onerror = function() {
            Swal.fire({
                icon: 'error',
                title: 'การเชื่อมต่อล้มเหลว',
                text: 'ไม่สามารถติดต่อกับระบบหลังบ้านได้ กรุณาลองใหม่อีกครั้ง'
            });
            delete window[callbackName];
            document.body.removeChild(script);
        };

        // ยัดแท็ก script เข้าไปในหน้าเว็บเพื่อให้เบราว์เซอร์เริ่มโหลดรันโค้ดทันที
        document.body.appendChild(script);
    });
</script>

</body>
</html>
